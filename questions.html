const YEARS=[];
for(const s in RAW)for(const y in RAW[s]){const yr=+y;if(!YEARS.includes(yr))YEARS.push(yr)}
YEARS.sort((a,b)=>a-b);

const P={};
for(const s in RAW){const v=RAW[s];const mx=Math.max(...Object.values(v));P[s]={raw:v,max:mx}}

function gc(pct){
if(pct===0)return{bg:'#0d0d14',fg:'#2a2a38'};
const S=[[0,13,17,23],[15,14,42,30],[30,15,81,50],[50,26,127,55],[70,46,160,67],[85,86,211,100],[100,175,245,180]];
let lo=S[0],hi=S[S.length-1];
for(let i=0;i<S.length-1;i++){if(pct>=S[i][0]&&pct<=S[i+1][0]){lo=S[i];hi=S[i+1];break}}
const t=(pct-lo[0])/(hi[0]-lo[0]||1);
const r=Math.round(lo[1]+t*(hi[1]-lo[1])),g=Math.round(lo[2]+t*(hi[2]-lo[2])),b=Math.round(lo[3]+t*(hi[3]-lo[3]));
return{bg:`rgb(${r},${g},${b})`,fg:pct>60?'#0a0a0f':'#8ec99a'}}

let cSort='alpha',fTxt='';
function getSites(){
let s=Object.keys(P);
if(fTxt){const f=fTxt.toLowerCase();s=s.filter(x=>x.toLowerCase().includes(f))}
switch(cSort){
case'alpha':s.sort((a,b)=>a.localeCompare(b));break;
case'peak-desc':s.sort((a,b)=>P[b].max-P[a].max);break;
case'peak-year':{const py=s2=>{let my=0,mv=0;for(const[y,v]of Object.entries(P[s2].raw))if(v>=mv){mv=v;my=+y}return my};s.sort((a,b)=>py(a)-py(b));break}
case'decline':{const dr=s2=>{const d=P[s2].raw;const l=d['2025']||d['2024']||0;return P[s2].max>0?l/P[s2].max:1};s.sort((a,b)=>dr(a)-dr(b));break}}
return s}

function render(){
document.getElementById('header-row').innerHTML='<th>Site</th>'+YEARS.map(y=>`<th>${y}</th>`).join('');
const sites=getSites();
document.getElementById('count-badge').textContent=`${sites.length} sites`;
const tb=document.getElementById('tbody');
const f=document.createDocumentFragment();
for(const site of sites){
const tr=document.createElement('tr');
const td0=document.createElement('td');td0.textContent=site;td0.title=site;tr.appendChild(td0);
for(const year of YEARS){
const td=document.createElement('td');
const raw=P[site].raw[year];
if(raw!==undefined){
const pct=Math.round(raw/P[site].max*100);
const c=gc(pct);
td.innerHTML=`<div class="cell" style="background:${c.bg};color:${c.fg}" data-site="${site}" data-year="${year}" data-pct="${pct}" data-raw="${raw}">${pct>0?pct:''}</div>`}
else td.innerHTML='<div class="cell empty">\u2014</div>';
tr.appendChild(td)}
f.appendChild(tr)}
tb.innerHTML='';tb.appendChild(f)}

const tt=document.getElementById('tooltip');
document.getElementById('tbody').addEventListener('mouseover',e=>{
const c=e.target.closest('.cell[data-site]');
if(!c){tt.style.display='none';return}
tt.querySelector('.tt-site').textContent=c.dataset.site;
tt.querySelector('.tt-year').textContent=c.dataset.year;
tt.querySelector('.tt-val').textContent=c.dataset.pct+'%';
tt.querySelector('.tt-raw').textContent=Number(c.dataset.raw).toLocaleString()+' questions (peak: '+P[c.dataset.site].max.toLocaleString()+')';
tt.style.display='block'});
document.addEventListener('mousemove',e=>{if(tt.style.display==='block'){
const x=e.clientX+14,y=e.clientY+14;
tt.style.left=Math.min(x,window.innerWidth-tt.offsetWidth-10)+'px';
tt.style.top=Math.min(y,window.innerHeight-tt.offsetHeight-10)+'px'}});
document.getElementById('tbody').addEventListener('mouseout',e=>{
if(!e.relatedTarget||!e.relatedTarget.closest('.cell[data-site]'))tt.style.display='none'});
document.querySelectorAll('.sort-btn').forEach(b=>b.addEventListener('click',()=>{
document.querySelectorAll('.sort-btn').forEach(x=>x.classList.remove('active'));
b.classList.add('active');cSort=b.dataset.sort;render()}));
document.getElementById('filter').addEventListener('input',e=>{fTxt=e.target.value;render()});
render();
</script>
